<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Educativa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e1e2f;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        h1 { color: #fff; text-align: center; margin-bottom: 5px; }
        p.subtitle { color: #aaa; margin-bottom: 30px; }
        
        .calculator {
            background: #2a2a40;
            padding: 25px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 8px;
            background: #d1d1e0;
            color: #111;
            font-weight: bold;
        }
        
        .bases {
            display: flex;
            justify-content: space-between;
            color: #fff;
            margin-bottom: 20px;
            background: #1e1e2f;
            padding: 10px;
            border-radius: 8px;
        }
        
        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #f0f0f5;
            transition: 0.2s;
        }
        
        button:hover:not(:disabled) { background: #fff; transform: scale(1.05); }
        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { background: #444; color: #666; cursor: not-allowed; }
        
        .operator { background: #ff9800; color: white; }
        .operator:hover:not(:disabled) { background: #ffb74d; }
        
        .explanation {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-left: 6px solid #4CAF50;
            width: 330px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            line-height: 1.6;
        }
        
        .highlight { color: #ff9800; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Calculadora Multi-Base</h1>
    <p class="subtitle">Aprende mientras calculas</p>

    <div class="calculator">
        <input type="text" id="display" disabled value="0">
        
        <div class="bases">
            <label><input type="radio" name="base" value="10" checked onchange="changeBase()"> DEC</label>
            <label><input type="radio" name="base" value="2" onchange="changeBase()"> BIN</label>
            <label><input type="radio" name="base" value="16" onchange="changeBase()"> HEX</label>
        </div>

        <div class="keys">
            <button onclick="append('A')" class="hex-key" disabled>A</button>
            <button onclick="append('B')" class="hex-key" disabled>B</button>
            <button onclick="append('C')" class="hex-key" disabled>C</button>
            <button onclick="setOp('/')" class="operator">/</button>

            <button onclick="append('D')" class="hex-key" disabled>D</button>
            <button onclick="append('E')" class="hex-key" disabled>E</button>
            <button onclick="append('F')" class="hex-key" disabled>F</button>
            <button onclick="setOp('*')" class="operator">*</button>

            <button onclick="append('7')" class="num-key dec-key">7</button>
            <button onclick="append('8')" class="num-key dec-key">8</button>
            <button onclick="append('9')" class="num-key dec-key">9</button>
            <button onclick="setOp('-')" class="operator">-</button>

            <button onclick="append('4')" class="num-key dec-key">4</button>
            <button onclick="append('5')" class="num-key dec-key">5</button>
            <button onclick="append('6')" class="num-key dec-key">6</button>
            <button onclick="setOp('+')" class="operator">+</button>

            <button onclick="append('1')" class="num-key">1</button>
            <button onclick="append('2')" class="num-key dec-key">2</button>
            <button onclick="append('3')" class="num-key dec-key">3</button>
            <button onclick="calculate()" class="operator">=</button>

            <button onclick="clearDisplay()" style="grid-column: span 2; background:#f44336; color:white;">Borrar</button>
            <button onclick="append('0')" class="num-key" style="grid-column: span 2;">0</button>
        </div>
    </div>

    <div class="explanation" id="explanationBox">
        💡 <strong>¡Hola!</strong><br>
        Haz una operación. Si realizas una división, aquí te explicaré exactamente qué está pasando y por qué da ese resultado.
    </div>

    <script>
        let display = document.getElementById('display');
        let currentBase = 10;
        let operand1 = null;
        let operator = null;
        let waitingForNewValue = false;

        function updateButtons() {
            let base = parseInt(document.querySelector('input[name="base"]:checked').value);
            
            // Habilitar/deshabilitar letras (A-F) solo para HEX
            document.querySelectorAll('.hex-key').forEach(btn => btn.disabled = (base !== 16));
            
            // Habilitar/deshabilitar números según la base (BIN solo 0 y 1)
            document.querySelectorAll('.num-key').forEach(btn => {
                let val = parseInt(btn.innerText);
                if (base === 2 && val >= 2) {
                    btn.disabled = true;
                } else {
                    btn.disabled = false;
                }
            });
        }

        function changeBase() {
            let newBase = parseInt(document.querySelector('input[name="base"]:checked').value);
            
            // Convertir el número actual de la pantalla a la nueva base
            if (display.value !== "" && display.value !== "0") {
                let decimalValue = parseInt(display.value, currentBase);
                if (!isNaN(decimalValue)) {
                    display.value = decimalValue.toString(newBase).toUpperCase();
                }
            }
            currentBase = newBase;
            updateButtons();
        }

        function append(val) {
            if (waitingForNewValue || display.value === "0") {
                display.value = val;
                waitingForNewValue = false;
            } else {
                display.value += val;
            }
        }

        function setOp(op) {
            operand1 = display.value;
            operator = op;
            waitingForNewValue = true;
        }

        function calculate() {
            if (operand1 === null || operator === null) return;
            
            let operand2 = display.value;

            // Convertir a base 10 (decimal) internamente para hacer la matemática
            let num1 = parseInt(operand1, currentBase);
            let num2 = parseInt(operand2, currentBase);
            let result = 0;

            if (operator === '+') result = num1 + num2;
            if (operator === '-') result = num1 - num2;
            if (operator === '*') result = num1 * num2;
            if (operator === '/') {
                if (num2 === 0) {
                    alert("¡No puedes dividir por cero! Romperás el universo matemático.");
                    clearDisplay();
                    return;
                }
                result = Math.floor(num1 / num2); // División entera
                let remainder = num1 % num2;
                explainDivision(num1, num2, result, remainder);
            } else {
                document.getElementById('explanationBox').innerHTML = "✔️ Operación realizada correctamente. <br><br><em>(¡Prueba hacer una división para ver la explicación educativa!)</em>";
            }

            // Devolver el resultado a la base seleccionada
            display.value = result.toString(currentBase).toUpperCase();
            operand1 = null;
            operator = null;
            waitingForNewValue = true;
        }

        function explainDivision(dividendo, divisor, cociente, residuo) {
            let box = document.getElementById('explanationBox');
            box.innerHTML = `
                🎓 <strong>¿Por qué divides y qué significa?</strong><br><br>
                Has dividido <span class="highlight">${dividendo}</span> (el dividendo) entre <span class="highlight">${divisor}</span> (el divisor).<br><br>
                La división es la operación de <strong>repartir equitativamente</strong>. Imagina que tienes ${dividendo} manzanas y quieres repartirlas en ${divisor} cajas iguales.<br><br>
                Al hacer esto, cada caja recibirá <span class="highlight">${cociente}</span> manzanas exactas.<br><br>
                ${residuo > 0 
                    ? `⚠️ Además, te sobrarán <span class="highlight">${residuo}</span> manzanas que no pudiste repartir. A esto se le llama <strong>residuo</strong> o <strong>resto</strong>.` 
                    : `✨ Como no te sobró ninguna manzana, a esto se le llama una <strong>división exacta</strong> (residuo 0).`}
                <br><br><em>Nota: Los ejemplos se muestran en decimal para facilitar el aprendizaje.</em>
            `;
        }

        function clearDisplay() {
            display.value = "0";
            operand1 = null;
            operator = null;
            document.getElementById('explanationBox').innerHTML = "💡 <strong>¡Hola!</strong><br>Haz una operación. Si realizas una división, aquí te explicaré exactamente qué está pasando y por qué da ese resultado.";
        }

        // Inicializar botones al cargar
        updateButtons();
    </script>
</body>
</html>
